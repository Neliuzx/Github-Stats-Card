<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Stats</title>
    <script src="./node_modules/html2canvas/dist/html2canvas.min.js"></script>
    <script src="./main.js" defer></script>
    <script src="./capture.js" defer></script>
    <script src="./customize.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <form role="search" method="get" class="form">
        <input type="search" id="search-input" placeholder="Exemple : Neliuzx" autocomplete="search" />
        <button id="submit-btn" type="submit">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg></button>
      </form>

      <div class="card-empty active" id="card-empty">
        <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
                <path d="M9 18c-4.51 2-5-2-7-2"/>
            </svg>
        </div>
        <h3 class="empty-title">Search a GitHub user</h3>
        <p class="empty-text">Enter a username above to display their stats card</p>
    </div>
    
    <div class="card-loading" id="card-loading">
        <div class="loader"></div>
        <p class="loading-text">Fetching profile...</p>
    </div>
    
    <div class="card-error" id="card-error">
        <div class="error-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <h3 class="error-title">User not found</h3>
        <p class="error-text">This GitHub user doesn't exist or couldn't be loaded</p>
    </div>

      <div class="global-card">
        <div class="card-banner">
            <div class="card-pfp">
                <img id="card-pfp" src="" alt="">
            </div>
        </div>
        <div class="card-infos">           
            <div class="infos-header">
                <div class="infos-identity">
                    <span id="infos-name"></span>
                    <span id="infos-login"></span>
                </div>
                <div class="infos-location" id="infos-location">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <span class="infos-location"></span>
                </div>
            </div>

            <div class="infos-languages">
                <span class="language"></span>
            </div>
            <div class="infos-stats">
                <div class="stat">
                    <span class="stat-repos"></span>
                    <span class="stat-label">Repos</span>
                </div>
                <div class="stat">
                    <span class="stat-followers"></span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat">
                    <span class="stat-stars"></span>
                    <span class="stat-label">Stars</span>
                </div>
            </div>
            
            <a href="" class="infos-cta" id="infos-cta">View GitHub Profile</a>
        </div>
      </div>
      <button id="customize-toggle" class="customize-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
            <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
            <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
            <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
        </svg>
        Customize
    </button>
    
    <div class="customize-panel" id="customize-panel">
        <div class="customize-header">
            <h3>Banner Colors</h3>
            <button class="customize-close" id="customize-close" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18"/>
                    <path d="m6 6 12 12"/>
                </svg>
            </button>
        </div>
    
        <div class="customize-colors">
            <label class="color-row">
                <span class="color-label">Color 1</span>
                <input type="color" data-var="--color-1" value="#ff6b35">
            </label>
            <label class="color-row">
                <span class="color-label">Color 2</span>
                <input type="color" data-var="--color-2" value="#f06292">
            </label>
            <label class="color-row">
                <span class="color-label">Color 3</span>
                <input type="color" data-var="--color-3" value="#8e24aa">
            </label>
            <label class="color-row">
                <span class="color-label">Color 4</span>
                <input type="color" data-var="--color-4" value="#5e35b1">
            </label>
            <label class="color-row">
                <span class="color-label">Color 5</span>
                <input type="color" data-var="--color-5" value="#3949ab">
            </label>
        </div>
    
        <div class="customize-presets">
            <span class="presets-label">Presets</span>
            <div class="presets-grid">
                <button class="preset" data-preset="sunset" style="background: linear-gradient(135deg, #ff6b35, #f06292, #8e24aa, #5e35b1, #3949ab);" title="Sunset"></button>
                <button class="preset" data-preset="ocean" style="background: linear-gradient(135deg, #06b6d4, #0284c7, #1d4ed8, #3730a3, #581c87);" title="Ocean"></button>
                <button class="preset" data-preset="forest" style="background: linear-gradient(135deg, #84cc16, #16a34a, #059669, #0d9488, #0891b2);" title="Forest"></button>
                <button class="preset" data-preset="candy" style="background: linear-gradient(135deg, #f472b6, #ec4899, #d946ef, #a855f7, #8b5cf6);" title="Candy"></button>
                <button class="preset" data-preset="fire" style="background: linear-gradient(135deg, #fef08a, #fb923c, #f97316, #dc2626, #991b1b);" title="Fire"></button>
                <button class="preset" data-preset="mono" style="background: linear-gradient(135deg, #1f2937, #374151, #4b5563, #6b7280, #9ca3af);" title="Mono"></button>
            </div>
        </div>
    </div>

<div class="download-group">
    <button class="download-btn">Download as JPG</button>
    <a class="download-capture" style="display: none;"></a>
</div>
</body>
</html>
